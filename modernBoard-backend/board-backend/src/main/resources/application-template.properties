spring.application.name=board-backend

server.port=8000

# 2. Oracle DB 
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=
spring.datasource.password=

# 3. MyBatis 
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.example.board.dto,com.example.board.vo
mybatis.configuration.map-underscore-to-camel-case=true

#오라클에서 NULL 값을 허용하기 위한 설정 (필수)
mybatis.configuration.jdbc-type-for-null=null

mybatis.configuration.map-underscore-to-camel-case=true


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

file.upload.dir=C:/fullstackWork/uploads/

# 따로 application-jwt로 만들어서 32자 이상 비밀번호
jwt.secret=


spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=